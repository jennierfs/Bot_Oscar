# ============================================
# Bot Oscar - Docker Compose
# Orquestación de todos los servicios
# ============================================

services:
  # ---- Backend Go ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bot-oscar-backend
    ports:
      - 127.0.0.1:${BACKEND_PORT:-8080}:8080
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TWELVE_DATA_API_KEY=${TWELVE_DATA_API_KEY}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bot-network

  # ---- Frontend React ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bot-oscar-frontend
    ports:
      - 127.0.0.1:${FRONTEND_PORT:-3000}:80
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - bot-network

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: bot-oscar-postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - 127.0.0.1:${DB_PORT:-5432}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bot_oscar} -d ${DB_NAME:-bot_oscar_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bot-network

  # ---- Redis ----
  redis:
    image: redis:8-alpine
    container_name: bot-oscar-redis
    ports:
      - 127.0.0.1:${REDIS_PORT:-6379}:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bot-network

volumes:
  postgres_data:
  redis_data:

networks:
  bot-network:
    driver: bridge
